name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: pip install bandit>=1.9.3
      - name: Run Bandit
        run: bandit -r src/ -ll -ii

  dependency-scan:
    name: Dependency Scan (Safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Safety
        run: pip install safety>=3.0
      - name: Run Safety
        run: safety check -r requirements.txt

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and dev dependencies
        run: |
          pip install -e .
          pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest --cov=gcp_risk_analyzer --cov-report=term-missing --cov-fail-under=70
